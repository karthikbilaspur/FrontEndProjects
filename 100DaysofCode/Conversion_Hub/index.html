            <div class="tab-pane fade" id="pills-resolution" role="tabpanel" aria-labelledby="pills-resolution-tab" tabindex="0">
                <div class="mb-3">
                    <label for="resolutionInput" class="form-label text-white">Enter value (e.g., megapixels, pixels):</label>
                    <input type="number" class="form-control" id="resolutionInput" placeholder="0">
                </div>
                <div class="row g-2 mb-3 align-items-center">
                    <div class="col-5">
                        <select id="resolutionFrom" class="form-select">
                            <option value="mp">Megapixels</option>
                            <option value="px">Pixels</option>
                        </select>
                    </div>
                    <div class="col-2 text-center">
                        <button class="btn btn-warning btn-sm" onclick="swapUnits('resolutionFrom','resolutionTo')" data-bs-toggle="tooltip" title="Swap Units">⇄</button>
                    </div>
                    <div class="col-5">
                        <select id="resolutionTo" class="form-select">
                            <option value="mp">Megapixels</option>
                            <option value="px">Pixels</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-info w-100 mb-2" onclick="convertResolution()">Convert</button>
                <p id="resolutionResult" class="result text-white text-center fs-5 mb-2"></p>
                <button class="btn btn-success w-100 mb-2 copy-btn" data-result-id="resolutionResult" data-tippy-content="Copied!" data-tippy-delay="[0, 500]">Copy Result</button>
                <button class="btn btn-danger w-100 reset-btn" data-section-id="resolution" data-tippy-content="Reset!" data-tippy-delay="[0, 500]">Reset</button>
            </div>

            <!-- NEW SECTIONS END -->
        </div>
    </div>
</div>

<!-- Notification Toast Container -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body">
                <!-- Message will be injected here -->
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>
